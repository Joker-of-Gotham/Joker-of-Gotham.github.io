name: Configure Branch Protection

on:
  workflow_dispatch:  # Manual trigger only
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sunday at midnight as backup check

# This workflow requires a personal access token with repo scope
# Create a secret called PAT_TOKEN with a personal access token
# The default GITHUB_TOKEN doesn't have admin permissions

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup GitHub CLI
        uses: actions/setup-gh-cli@v1
          
      - name: Configure branch protection with required checks
        env:
          # Use PAT_TOKEN if available, otherwise use GITHUB_TOKEN (which may not have admin permissions)
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "Configuring branch protection for main branch..."
          
          # Get the workflow name from deploy.yml
          WORKFLOW_NAME="Build and Deploy Astro site"
          
          # First, check current protection status
          echo "Current branch protection status:"
          gh api /repos/${{ github.repository }}/branches/main/protection --silent || echo "Note: May not have permission to view protection"
          
          # Update branch protection with required status checks using GitHub CLI
          echo "Updating required status checks..."
          # Create JSON payload for the update
          echo '{"strict": false, "contexts": ["'"$WORKFLOW_NAME"'"]}' | \
            gh api -X PATCH /repos/${{ github.repository }}/branches/main/protection/required_status_checks --input - --silent && \
            echo "Branch protection updated with required status check: $WORKFLOW_NAME" || \
            echo "Note: May not have permission to update branch protection. Ensure PAT_TOKEN secret is set with a personal access token with repo scope."
          
      - name: Verify configuration
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "Verifying branch protection configuration..."
          
          # Get and display the protection configuration
          echo "Full protection configuration:"
          gh api /repos/${{ github.repository }}/branches/main/protection --silent || echo "Note: May not have permission to view protection details"
          
          echo ""
          echo "Required status checks details:"
          gh api /repos/${{ github.repository }}/branches/main/protection/required_status_checks --silent || echo "Note: May not have permission to view required status checks"
          
          echo ""
          echo "Note: If this workflow fails due to permissions, you can:"
          echo "1. Create a personal access token with repo scope"
          echo "2. Add it as a repository secret named PAT_TOKEN"
          echo "3. Or disable this workflow if branch protection is already configured manually"