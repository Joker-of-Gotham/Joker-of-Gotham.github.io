name: Configure Branch Protection

on:
  workflow_dispatch:  # Manual trigger only
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sunday at midnight as backup check

permissions:
  contents: read
  pull-requests: write
  administration: write

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup GitHub CLI
        run: |
          type -p curl >/dev/null || (apt-get update && apt-get install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && apt-get update \
          && apt-get install gh -y
          
      - name: Configure branch protection with required checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Configuring branch protection for main branch..."
          
          # Get the workflow name from deploy.yml
          WORKFLOW_NAME="Build and Deploy Astro site"
          
          # First, check current protection status
          echo "Current branch protection status:"
          gh api /repos/${{ github.repository }}/branches/main/protection
          
          # Update branch protection with required status checks using GitHub CLI
          echo "Updating required status checks..."
          gh api -X PATCH /repos/${{ github.repository }}/branches/main/protection/required_status_checks \
            -f strict:bool=false \
            -f contexts[]="$WORKFLOW_NAME"
          
          echo "Branch protection updated with required status check: $WORKFLOW_NAME"
          
      - name: Verify configuration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Verifying branch protection configuration..."
          
          # Get and display the protection configuration
          echo "Full protection configuration:"
          gh api /repos/${{ github.repository }}/branches/main/protection
          
          echo ""
          echo "Required status checks details:"
          gh api /repos/${{ github.repository }}/branches/main/protection/required_status_checks
          
          echo ""
          echo "Done! Main branch now requires the 'Build and Deploy Astro site' check to pass before merging."