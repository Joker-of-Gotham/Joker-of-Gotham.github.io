name: Enable Basic Branch Protection
on:
  workflow_dispatch:  # Manual trigger only
permissions:
  contents: write
  pull-requests: write
  administration: write
jobs:
  protect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup GitHub CLI
        run: |
          gh --version
          
      - name: Enable minimal branch protection
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Enabling basic branch protection for main branch..."
          
          # Try a minimal protection setup
          gh api \
            --method PUT \
            /repos/${{ github.repository }}/branches/main/protection \
            -f "required_status_checks=null" \
            -f "enforce_admins=true" \
            -f "required_pull_request_reviews[required_approving_review_count]=1" \
            -f "allow_force_pushes=false" \
            -f "allow_deletions=false"
          
          echo "Basic branch protection enabled!"