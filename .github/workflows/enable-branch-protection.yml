name: Enable Branch Protection
on:
  push:
    branches:
      - main
permissions:
  contents: write
  pull-requests: write
  administration: write
jobs:
  protect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Enable branch protection for main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # First, check current protection status
          echo "Checking current branch protection status..."
          
          # Enable branch protection using GitHub CLI
          gh api \
            --method PUT \
            /repos/${{ github.repository }}/branches/main/protection \
            --input - << EOF
          {
            "required_status_checks": null,
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": true,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": true
          }
          EOF
          
          echo "Branch protection enabled successfully!"